version: "3.8"

services:
  db:
    image: mysql:8.3
    container_name: dockercheck-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: artgallery
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: dockercheck-backend
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    container_name: dockercheck-frontend
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
